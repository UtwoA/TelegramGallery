{% extends "base.html" %}
{% block content %}
<section class="panel auth-card">
  <h1>Вход в TelegramGallery</h1>
  <p class="muted">Семейный доступ к галерее по логину и паролю.</p>

  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}

  <form method="post" action="/login" class="form-grid compact">
    <input type="hidden" name="next" value="{{ next }}" />
    <label>Логин <input type="text" name="username" required /></label>
    <label>Пароль <input type="password" name="password" required /></label>
    <div><button type="submit">Войти</button></div>
  </form>
</section>
{% endblock %}
