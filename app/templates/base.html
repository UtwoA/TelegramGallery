<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title if title else "TelegramGallery" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">TelegramGallery</a>
    <nav class="menu">
      <a href="/">История</a>
      <a href="/all-photos">Все фото</a>
      {% if is_admin %}
        <a href="/upload">Загрузка</a>
        <a href="/categories">Категории</a>
        <a href="/logout">Выйти</a>
      {% else %}
        <a href="/login">Вход</a>
      {% endif %}
    </nav>
  </header>

  <main class="page">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', path='/js/main.js') }}"></script>
</body>
</html>
