# Nginx config for TelegramGallery on seoul.utwoa.ru
# 1) Copy to /etc/nginx/sites-available/seoul.utwoa.ru
# 2) ln -s /etc/nginx/sites-available/seoul.utwoa.ru /etc/nginx/sites-enabled/
# 3) nginx -t && systemctl reload nginx
# 4) Issue cert: certbot --nginx -d seoul.utwoa.ru

server {
    listen 80;
    listen [::]:80;
    server_name seoul.utwoa.ru;

    client_max_body_size 2G;

    location / {
        proxy_pass http://127.0.0.1:18000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 600;
        proxy_send_timeout 600;
    }
}
