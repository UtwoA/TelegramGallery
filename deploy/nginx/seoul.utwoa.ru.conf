# Nginx config for TelegramGallery on seoul.utwoa.ru
# 1) Copy to /etc/nginx/sites-available/seoul.utwoa.ru
# 2) ln -s /etc/nginx/sites-available/seoul.utwoa.ru /etc/nginx/sites-enabled/
# 3) nginx -t && systemctl reload nginx
# 4) Issue cert: certbot --nginx -d seoul.utwoa.ru

server {
    listen 80;
    listen [::]:80;
    server_name seoul.utwoa.ru;

    client_max_body_size 4G;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Fast path for media files. Change alias if your repo path is different.
    location /media/ {
        alias /opt/TelegramGallery/data/media/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:18000;
        proxy_http_version 1.1;
        proxy_request_buffering off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 600;
        proxy_send_timeout 600;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:18000;
        proxy_http_version 1.1;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
